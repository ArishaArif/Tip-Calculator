<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width,initial-scale=1.0">
    <title>Tip Calcultaor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="header">
            <h1>💲 Tip Calculator</h1>
            <p>Calculates tips and split bills</p>
        </div>
        <div class="input-section">
            <div class="input-group">
                <label>
                    <span class="icon">🧾</span>
                    Bill Amount
                </label>
                <div class="input-field">
                    <span class="currency">$</span>
                    <input type="number" id="billAmount" class="with-currency" placeholder=" 0.00" step="0.01" min="0">
                </div>
            </div>
        </div>
        <div class="input-group">
            <label>
                <span class="icon">💳</span>
                Select Tip%
            </label>
            <div class="tip-buttons">
                <button class="tip-btn " data-tip="10">10 %</button>
                <button class="tip-btn" data-tip="15">15 %</button>
                <button class="tip-btn" data-tip="20">20 %</button>

            </div>
            <div class="custom-tip">
                <input type="number" id="customTip"  placeholder="Custom Tip %" step="0.01" min="0">

            </div>
        </div>
        <div class="input-group">
            <label>
                <span class="icon">🙍🏻‍♂️</span>
                Number of People
            </label>
            <div class="people-selector">
                <button class="people-btn" id="decreasePeople">-</button>
                <span class="people-count" id="peopleCount">1</span>
                <button class="people-btn" id="increasePeople">+</button>

            </div>
        </div>
    <!-- Results -->
     <div class="results">
        <div class="result-row">
            <div class="reult-label">
                <span class="icon">+</span>
                Tip Amount
            </div>
            <div class="result-value" id="tipAmount">$0.00</div>
        </div>
         <div class="result-row">
            <div class="reult-label">
                <span class="icon">=</span>
                Total Amount
            </div>
            <div class="result-value highlight" id="totalAmount">$0.00</div>
        </div>
         <div class="result-row">
            <div class="reult-label">
                <span class="icon">÷</span>
                Per Person
            </div>
            <div class="result-value" id="perPersonAmount">$0.00</div>
        </div>
         <div class="result-row">
            <div class="reult-label">
                <span class="icon">•</span>
                Tip Per Person
            </div>
            <div class="result-value" id="TipPerPerson">$0.00</div>
        </div>
     </div>
     <div class="reset-btn" id="resetBtn">⟳Reset All</div>
    </main>
    <script src="script.js"></script>
</body>
</html>
